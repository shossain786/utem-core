# Test Configuration - Uses H2 in-memory database
spring.application.name=utem-core-test

# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable devtools in tests
spring.devtools.add-properties=false

# Attachment Storage Configuration (Test)
utem.storage.base-path=./target/test-attachments
utem.storage.max-file-size-mb=10
utem.storage.organize-by-run-id=true
