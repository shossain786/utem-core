spring.application.name=utem-core

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:utem.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA/Hibernate for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Attachment Storage Configuration
utem.storage.base-path=./utem-attachments
utem.storage.max-file-size-mb=50
utem.storage.organize-by-run-id=true

# Data Retention Configuration
# Set enabled=false to disable automatic cleanup
utem.retention.enabled=true
utem.retention.retention-days=30
utem.retention.cron-expression=0 0 2 * * *

# Stale Run Recovery Configuration
# Runs stuck in RUNNING status for longer than stale-threshold-minutes are marked ABORTED
utem.recovery.enabled=true
utem.recovery.check-interval-ms=300000
utem.recovery.stale-threshold-minutes=60

# Notification Configuration
# Base URL of the UTEM dashboard (used to build deep links in notifications)
utem.notification.dashboard-base-url=http://localhost:5173

# Jenkins Webhook Notification
# Set enabled=true and provide the Jenkins Generic Webhook Trigger URL
utem.notification.jenkins.enabled=false
utem.notification.jenkins.url=

# Microsoft Teams Notification (via Incoming Webhook)
# Set enabled=true and provide the Teams incoming webhook URL
utem.notification.teams.enabled=false
utem.notification.teams.webhook-url=

# Email Notification
# Set enabled=true, configure recipient(s) and Spring Mail SMTP settings below
utem.notification.email.enabled=false
utem.notification.email.to=
utem.notification.email.from=utem@localhost

# Spring Mail SMTP (required when email notifications are enabled)
# Example for Gmail:
#   spring.mail.host=smtp.gmail.com
#   spring.mail.port=587
#   spring.mail.username=sender@gmail.com
#   spring.mail.password=app-password
#   spring.mail.properties.mail.smtp.auth=true
#   spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.host=localhost
spring.mail.port=25
