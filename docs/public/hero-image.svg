<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" fill="none">
  <!-- Background card -->
  <rect x="10" y="10" width="500" height="360" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>

