  <rect x="26" y="158" width="200" height="24" rx="6" fill="#1e293b"/>
  <circle cx="40" cy="170" r="5" fill="#22c55e"/>
  <rect x="52" y="165" width="70" height="8" rx="3" fill="#334155"/>
  <rect x="150" y="165" width="40" height="8" rx="3" fill="#1d4ed833"/>
  <text x="170" y="173" font-family="sans-serif" font-size="7" fill="#60a5fa" text-anchor="middle">302/302</text>

  <rect x="26" y="188" width="200" height="24" rx="6" fill="#1e293b"/>
  <circle cx="40" cy="200" r="5" fill="#22c55e"/>
  <rect x="52" y="195" width="85" height="8" rx="3" fill="#334155"/>
  <rect x="150" y="195" width="40" height="8" rx="3" fill="#1d4ed833"/>
