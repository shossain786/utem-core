  <!-- Right panel: trend chart -->
  <rect x="244" y="68" width="256" height="160" rx="8" fill="#1e293b"/>
  <text x="260" y="86" font-family="sans-serif" font-size="9" fill="#94a3b8">Pass Rate Trend</text>

  <!-- Chart grid lines -->
  <line x1="260" y1="100" x2="484" y2="100" stroke="#334155" stroke-width="0.5"/>
  <line x1="260" y1="120" x2="484" y2="120" stroke="#334155" stroke-width="0.5"/>
  <line x1="260" y1="140" x2="484" y2="140" stroke="#334155" stroke-width="0.5"/>
  <line x1="260" y1="160" x2="484" y2="160" stroke="#334155" stroke-width="0.5"/>
  <line x1="260" y1="180" x2="484" y2="180" stroke="#334155" stroke-width="0.5"/>
