  <rect x="26" y="128" width="200" height="24" rx="6" fill="#1e293b"/>
  <circle cx="40" cy="140" r="5" fill="#f59e0b"/>
  <rect x="52" y="135" width="100" height="8" rx="3" fill="#334155"/>
  <rect x="150" y="135" width="40" height="8" rx="3" fill="#ca8a0433"/>
