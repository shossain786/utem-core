  <text x="208" y="268" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Pass Rate</text>
  <text x="208" y="294" font-family="sans-serif" font-size="22" font-weight="bold" fill="#22c55e" text-anchor="middle">94.2%</text>

  <rect x="278" y="248" width="112" height="64" rx="8" fill="#1e293b"/>
  <text x="334" y="268" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Flaky Tests</text>
  <text x="334" y="294" font-family="sans-serif" font-size="22" font-weight="bold" fill="#f59e0b" text-anchor="middle">7</text>

  <rect x="404" y="248" width="96" height="64" rx="8" fill="#1e293b"/>
  <text x="452" y="268" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Avg Duration</text>
  <text x="452" y="294" font-family="sans-serif" font-size="22" font-weight="bold" fill="#60a5fa" text-anchor="middle">3.2m</text>

  <!-- Live indicator -->
  <circle cx="36" cy="340" r="4" fill="#22c55e"/>
  <text x="46" y="344" font-family="sans-serif" font-size="9" fill="#22c55e">Live · WebSocket connected</text>
</svg>
