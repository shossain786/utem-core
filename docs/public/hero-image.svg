  <text x="257" y="143" font-family="monospace" font-size="7" fill="#475569" text-anchor="end">75%</text>
  <text x="257" y="183" font-family="monospace" font-size="7" fill="#475569" text-anchor="end">50%</text>

  <!-- Area fill -->
  <path d="M264,185 L302,160 L340,145 L378,120 L416,108 L454,103 L484,100 L484,200 L264,200 Z" fill="#3b82f620"/>
