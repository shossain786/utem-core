  <rect x="10" y="38" width="500" height="16" fill="#1e293b"/>
  <circle cx="36" cy="32" r="6" fill="#ef4444"/>
  <circle cx="56" cy="32" r="6" fill="#f59e0b"/>
  <circle cx="76" cy="32" r="6" fill="#22c55e"/>
  <rect x="100" y="24" width="140" height="16" rx="4" fill="#0f172a"/>
  <text x="110" y="36" font-family="monospace" font-size="10" fill="#94a3b8">UTEM Dashboard</text>

  <!-- Status badges -->
  <rect x="340" y="22" width="52" height="20" rx="10" fill="#16a34a33"/>
