  <!-- Data points -->
  <circle cx="264" cy="185" r="3" fill="#3b82f6"/>
  <circle cx="302" cy="160" r="3" fill="#3b82f6"/>
  <circle cx="340" cy="145" r="3" fill="#3b82f6"/>
  <circle cx="378" cy="120" r="3" fill="#3b82f6"/>
  <circle cx="416" cy="108" r="3" fill="#3b82f6"/>
  <circle cx="454" cy="103" r="3" fill="#3b82f6"/>
  <circle cx="484" cy="100" r="3.5" fill="white" stroke="#3b82f6" stroke-width="2"/>

  <!-- Bottom: stats row -->
  <rect x="26" y="248" width="112" height="64" rx="8" fill="#1e293b"/>
  <text x="82" y="268" font-family="sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Total Runs</text>
  <text x="82" y="294" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">1,284</text>

