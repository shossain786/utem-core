services:
  utem-core:
    image: shossain786/utem-core:latest
    container_name: utem-core
    ports:
      - "9090:8080"
    volumes:
      - utem-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/utem.db
    restart: unless-stopped

volumes:
  utem-data:
    driver: local
