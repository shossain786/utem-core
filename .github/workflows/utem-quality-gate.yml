name: UTEM Quality Gate

# ─────────────────────────────────────────────────────────────────────────────
# Required repository variables (Settings → Variables → Actions):
#   UTEM_URL              — e.g. https://utem.yourcompany.com
#   UTEM_MAX_FAIL_RATE    — e.g. 5.0  (allow up to 5% failure rate)
#   UTEM_MAX_FLAKINESS    — e.g. 30.0 (avg flakiness score threshold)
#   UTEM_MAX_NEW_FAILURES — e.g. 0    (zero regressions allowed; -1 disables)
#   UTEM_BASELINE_RUN_ID  — optional, baseline run ID for regression comparison
#
# Your test step must write the UTEM run ID to $UTEM_RUN_ID_FILE so this
# workflow can look it up. Set UTEM_RUN_ID_FILE in your test step's env.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      run_id:
        description: 'UTEM run ID (if known; otherwise read from $UTEM_RUN_ID_FILE)'
        required: false
        type: string

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      # ── Resolve run ID ─────────────────────────────────────────────────────
      - name: Resolve UTEM run ID
        run: |
          RUN_ID="${{ inputs.run_id }}"
          if [ -z "$RUN_ID" ] && [ -f "/tmp/utem_run_id.txt" ]; then
            RUN_ID=$(cat /tmp/utem_run_id.txt)
          fi
          if [ -z "$RUN_ID" ]; then
            echo "Error: UTEM run ID not found. Pass it as input or write it to /tmp/utem_run_id.txt"
            exit 1
          fi
          echo "UTEM_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      # ── Wait for run to finish ──────────────────────────────────────────────
      - name: Wait for UTEM run to complete
        env:
          UTEM_URL: ${{ vars.UTEM_URL }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "$UTEM_URL/utem/runs/$UTEM_RUN_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" 2>/dev/null || echo "UNKNOWN")
            echo "Attempt $i: status = $STATUS"
            case "$STATUS" in
              PASSED|FAILED|ABORTED)
                echo "Run finished with status: $STATUS"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for UTEM run to complete"
          exit 1

      # ── Evaluate quality gate ───────────────────────────────────────────────
      - name: Evaluate quality gate
        env:
          UTEM_URL:              ${{ vars.UTEM_URL }}
          MAX_FAIL_RATE:         ${{ vars.UTEM_MAX_FAIL_RATE        || '100.0' }}
          MAX_FLAKINESS:         ${{ vars.UTEM_MAX_FLAKINESS        || '100.0' }}
          MAX_NEW_FAILURES:      ${{ vars.UTEM_MAX_NEW_FAILURES      || '-1' }}
          BASELINE_RUN_ID:       ${{ vars.UTEM_BASELINE_RUN_ID      || '' }}
        run: |
          GATE_URL="$UTEM_URL/utem/quality-gate/$UTEM_RUN_ID"
          GATE_URL="${GATE_URL}?maxFailRate=${MAX_FAIL_RATE}&maxFlakinessScore=${MAX_FLAKINESS}&maxNewFailures=${MAX_NEW_FAILURES}"
          if [ -n "$BASELINE_RUN_ID" ]; then
            GATE_URL="${GATE_URL}&baselineRunId=${BASELINE_RUN_ID}"
          fi

          HTTP_CODE=$(curl -s -o /tmp/gate_result.json -w "%{http_code}" "$GATE_URL")
          echo "HTTP status: $HTTP_CODE"
          echo "GATE_HTTP=$HTTP_CODE" >> $GITHUB_ENV
          cat /tmp/gate_result.json

      # ── Fetch CI summary markdown ───────────────────────────────────────────
      - name: Fetch CI summary
        env:
          UTEM_URL: ${{ vars.UTEM_URL }}
        run: |
          SUMMARY=$(curl -sf "$UTEM_URL/utem/runs/$UTEM_RUN_ID/ci-summary" || echo "_Summary unavailable_")
          {
            echo 'CI_SUMMARY<<EOF'
            echo "$SUMMARY"
            echo 'EOF'
          } >> $GITHUB_ENV

      # ── Post PR comment ─────────────────────────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed = process.env.GATE_HTTP === '200';
            const header = passed
              ? '> ✅ **Quality Gate: PASSED**'
              : '> ❌ **Quality Gate: FAILED** — see violations below';

            const body = `${header}\n\n${process.env.CI_SUMMARY}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── Fail the build if gate failed ──────────────────────────────────────
      - name: Enforce quality gate
        run: |
          if [ "$GATE_HTTP" != "200" ]; then
            echo "❌ Quality gate FAILED (HTTP $GATE_HTTP)"
            cat /tmp/gate_result.json
            exit 1
          fi
          echo "✅ Quality gate passed."
